name: Build Express Adapter
on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'code/adapters/express/**'
      - '.github/workflows/test-express.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: 'pnpm'
          cache-dependency-path: code/adapters/express/pnpm-lock.yaml

      - name: Run Tests
        working-directory: code/adapters/express
        run: |
          pnpm install --frozen-lockfile
          pnpm test
