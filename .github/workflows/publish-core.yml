name: Publish Core to NPM

on:
    push:
        branches: [main]
        paths:
            - "code/core/**"
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    check-version:
        runs-on: ubuntu-latest
        outputs:
            version_changed: ${{ steps.changed-package-json.outputs.any_changed }}
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 2

            - name: Check if package.json version changed
              id: changed-package-json
              uses: tj-actions/changed-files@v47
              with:
                  files: code/core/package.json

    publish-core:
        # needs: check-version
        # if: needs.check-version.outputs.version_changed == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: code
        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v3
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm"
                  cache-dependency-path: code/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm --filter "@jfrz38/pid-controller-core" build

            - name: Run Tests
              run: pnpm --filter "@jfrz38/pid-controller-core" test

            - name: Publish to NPM
              working-directory: code/core
              run: pnpm publish --access public --no-git-checks
