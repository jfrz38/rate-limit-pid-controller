name: Build Shared Adapter
on:
  pull_request:
    branches: [main, develop]
    paths:
      - "code/adapters/shared/**"
      - "code/core/**"
      - "Makefile"
      - ".github/workflows/build-shared.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: make install-code
        
      - name: Build
        run: make build-shared

      - name: Run Tests
        run: make test-shared
