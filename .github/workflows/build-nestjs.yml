name: Build NestJS Adapter
on:
  pull_request:
    branches: [main, develop]
    paths:
      - "code/adapters/nestjs/**"
      - ".github/workflows/build-nestjs.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "@jfrz38/pid-controller-nestjs..." build

      - name: Run Tests
        run: pnpm --filter "@jfrz38/pid-controller-nestjs^..." test
