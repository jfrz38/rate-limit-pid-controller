name: Publish Express Adapter to NPM

on:
  push:
    branches: [main]
    paths:
      - 'code/adapters/express/**'

permissions:
  id-token: write
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.changed-package-json.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if package.json version changed
        id: changed-package-json
        uses: tj-actions/changed-files@v44
        with:
          files: code/adapters/express/package.json

  publish-express:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/adapters/express
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: code/adapters/express/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build --if-present
      - run: pnpm test
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
