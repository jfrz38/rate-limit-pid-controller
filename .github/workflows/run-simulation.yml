name: Run PID Simulation
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to execute"
        required: true
        default: "base"
        type: choice
        options:
          - base
          - aggressive_peak
          - high_latency
          - high_volume
          - priority_spike
          - stress
          - low_latency

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: |
            code/pnpm-lock.yaml
            simulation/scripts/runner/pnpm-lock.yaml

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Restore Python dependencies cache
        uses: actions/cache@v5
        with:
          path: simulation/.venv
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-poetry-${{ hashFiles('simulation/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-poetry-

      - name: Install Python dependencies
        run: make install-simulation

      - name: Generate Scenario
        run: make simulation-generate SCENARIO=${{ github.event.inputs.scenario }}

      - name: Install code dependencies
        run: make install-code

      - name: Install Runner Dependencies
        run: make install-simulation-runner

      - name: Run Simulation
        run: make simulation-run SCENARIO=${{ github.event.inputs.scenario }}

      - name: Generate Visual Report
        run: make simulation-report SCENARIO=${{ github.event.inputs.scenario }}

      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f simulation/scripts/runner/results/last_execution.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update last simulation execution chart" && git push)
