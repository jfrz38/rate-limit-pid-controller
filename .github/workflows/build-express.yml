name: Build Express Adapter
on:
  pull_request:
    branches: [main, develop]
    paths:
      - "code/adapters/express/**"
      - ".github/workflows/build-express.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "@jfrz38/pid-controller-express^..." run build

      - name: Run Tests
        run: pnpm --filter "@jfrz38/pid-controller-express..." test
