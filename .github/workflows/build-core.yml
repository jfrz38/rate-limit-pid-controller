name: Build Core
on:
    pull_request:
        branches: [main, develop]
        paths:
            - "code/core/**"
            - ".github/workflows/build-core.yml"

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v3
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "pnpm"
                  cache-dependency-path: code/pnpm-lock.yaml

            - name: Install dependencies
              working-directory: code
              run: pnpm install --filter "@jfrz38/pid-controller-core" --frozen-lockfile

            - name: Build
              working-directory: code/core
              run: pnpm build

            - name: Run Tests
              working-directory: code/core
              run: pnpm test
